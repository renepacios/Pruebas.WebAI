<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificando sentimientos</title>
    
    <script type="module">
        import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.0.1";

        const classifier = await pipeline(
            "sentiment-analysis",
            "Xenova/distilbert-base-uncased-finetuned-sst-2-english"
        );

        console.log('Pipeline cargado:', classifier);

        const txt = document.getElementById('text');
        const out = document.getElementById('result');
        const analyzeButton = document.getElementById('analyze');
        analyzeButton.addEventListener('click', async () => {

            console.log('Analizando texto:', txt.value);
            const result = await classifier(txt.value);

            out.value += JSON.stringify(result, null, 2);


        });
    </script>
</head>

<body>
    <textarea name="text" style="width: 50%;min-height: 200px;" id="text">Me encanta esto</textarea>
    <textarea name="result" style="width: 50%;min-height: 200px;" id="result"></textarea>
    <button id="analyze">Analizar</button>

    <div style="position: absolute;bottom: 20px;">
        <a href="../Index.html">Volver al índice</a>
    </div>
</body>

</html>
